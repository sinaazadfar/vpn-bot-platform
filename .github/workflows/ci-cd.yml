name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest tests
      - name: Alembic heads
        run: python -m alembic heads

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build app image
        run: docker build -f deploy/Dockerfile -t vpn-bot-platform:${{ github.sha }} .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docker-build
    runs-on: self-hosted
    steps:
      - name: Deploy to server-04
        run: |
          ssh server-04 "APP_DIR='${{ secrets.DEPLOY_APP_DIR }}' DEPLOY_BRANCH='main' sh '${{ secrets.DEPLOY_APP_DIR }}/deploy/deploy.sh'"
